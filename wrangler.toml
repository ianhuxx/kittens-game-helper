name = "activist-cef-tracker"
main = "src/index.ts"
compatibility_date = "2026-06-18"

[assets]
directory = "./ui/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "activist-cef-tracker"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "FILINGS_BUCKET"
bucket_name = "activist-cef-filings"

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[queues.producers]]
binding = "PARSE_QUEUE"
queue = "filing-parse-queue"

[[queues.consumers]]
queue = "filing-parse-queue"
max_batch_size = 10
max_batch_timeout = 30

[triggers]
# Weekdays every 15 minutes from 13:00-22:00 UTC, roughly US market/filing hours (9am-6pm ET; 6am-3pm PT depending DST).
# Daily catch-up at 01:20 UTC after EDGAR processing settles.
# Daily digest at 12:30 UTC before the US trading day.
crons = ["*/15 13-22 * * 1-5", "20 1 * * *", "30 12 * * 1-5"]

[vars]
SEC_USER_AGENT_EMAIL = "ianyibohuxx@gmail.com"
